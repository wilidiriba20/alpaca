<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpaca Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="alpaca.css" />
</head>

<body>
  <h1>Alpaca Generator</h1>

  <div class="container">
    <!-- LEFT SIDE -->
    <div class="alpaca-box">
      <div class="alpaca-image">
        <img src="../alpaca/backgrounds/blue50.png" class="layer backgrounds" />
        <img src="../alpaca/accessories/headphone.png" class="layer accessories" />
        <img src="../alpaca/eyes/default.png" class="layer eyes" />
        <img src="../alpaca/hair/default.png" class="layer hair" />
        <img src="../alpaca/ears/default.png" class="layer ears" />
        <img src="../alpaca/nose/nose.png" class="layer nose" />
        <img src="../alpaca/mouth/default.png" class="layer mouth" />
        <img src="../alpaca/neck/default.png" class="layer neck" />
        <img src="../alpaca/leg/default.png" class="layer leg" />
      </div>

      <div class="buttons">
        <button id="random">Random</button>
        <button id="download">Download</button>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="controls">
      <div class="category">
        <h2>ACCESSORIZE THE ALPACA'S</h2>

        <div class="button-group">
          <button id="hair">Hair</button>
          <button id="ears">Ears</button>
          <button id="eyes">Eyes</button>
          <button id="nose">Nose</button>
          <button id="mouth">Mouth</button>
          <button id="neck">Neck</button>
          <button id="leg">Leg</button>
          <button id="accessories">Accessories</button>
          <button id="backgrounds">Background</button>
        </div>
      </div>

      <div class="styles">
        <h2>STYLE</h2>
        <div class="button-group"></div>
      </div>
    </div>
  </div>
   <script src="https://html2canvas.hertzen.com/dist/html2canvas.js"></script>
  <script src="alpaca.js"></script>
</body>

</html>
