<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpaca</title>
    <link rel="stylesheet" href="alpaca.css" />
  </head>
  <body>
    <div class="container">
        <!-- alpaca image generated -->
      <div class="alpaca">
        <div class="head">
            <div class="hair">
                
            </div>
            <div class="face">
                <div class="eye1"></div>
                <div class="ears"></div>
                <div class="nose"></div>
                <div class="mouth"></div>
            </div>
            <div class="nake"></div>
            <div class="leg"></div>
        </div>
        <div class="end">
          <div class="butt1">
        
            <button type="button">Random</button>
          </div>
          <div class="butt2">
            <button type="button">Download</button>
          </div>
        </div>
      </div>
       <!-- buttons for change-->
      <div class="change"></div>
    </div>
  </body>
</html>
